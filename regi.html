<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Bookstore</title>
    <link rel="stylesheet" href="regi.css">
    <script defer src="s1.js"></script>
</head>
<body>
    <div class="register-container">
        <div class="form-header">
            <h2>Create Your Account</h2>
            <p>Join our bookstore community and explore endless books!</p>
        </div>
        <form id="registrationForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="example@domain.com">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="Re-enter password">
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required placeholder="1234567890">
            </div>

            <button type="submit" class="register-btn">Sign Up</button>
        </form>
        <p>Already a member? <a href="login.html">Log in here</a></p>
    </div>
</body>
</html>
